name: Bug report
description: Report a defect in the plugin template.
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: tc-version
    attributes:
      label: TeamCity version
      placeholder: e.g. 2025.11
    validations:
      required: true
  - type: input
    id: jvm-version
    attributes:
      label: JVM version
      placeholder: e.g. Temurin 21.0.5
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack traces
      render: shell
